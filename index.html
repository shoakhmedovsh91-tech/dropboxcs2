<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROPBOX CS2 — Premium Simulator</title>
    <style>
        :root {
            --bg-main: #060709;
            --bg-card: #0b0d13;
            --bg-nav: #10131a;
            --border-color: #161b26;
            --text-main: #e1e7f0;
            --text-muted: #626f85;
            
            --mil-spec: #4b69ff;
            --restricted: #8847ff;
            --classified: #d32ce6;
            --covert: #eb4b4b;
            --special: #e4ae39;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', sans-serif; }

        body {
            background-color: var(--bg-main); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 24px; overflow-x: hidden;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 1200px; background: var(--bg-nav);
            padding: 14px 28px; border-radius: 14px; margin-bottom: 32px;
            border: 1px solid var(--border-color);
        }

        .logo {
            font-size: 24px; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(90deg, #5dfdcb, #c300ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-tabs { display: flex; gap: 8px; }

        .tab-btn {
            background: transparent; color: var(--text-muted); border: 1px solid transparent;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;
            transition: 0.25s;
        }

        .tab-btn:hover, .tab-btn.active {
            color: #fff; background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08);
        }

        .balance-box {
            background: rgba(93, 253, 203, 0.06); border: 1px solid rgba(93, 253, 203, 0.15);
            padding: 10px 20px; border-radius: 10px; font-weight: 700; color: #5dfdcb;
        }

        .page { display: none; width: 100%; max-width: 1200px; flex-direction: column; animation: fadeIn 0.3s; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .cases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .case-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 24px; text-align: center; cursor: pointer; transition: 0.25s;
        }
        .case-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-4px); }
        .case-icon-wrap { height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .case-icon-wrap svg { width: 80px; height: 80px; fill: var(--text-muted); transition: 0.25s; }
        .case-card:hover .case-icon-wrap svg { transform: scale(1.1) rotate(3deg); fill: #fff; }
        .case-name { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: #fff; }
        .case-price { font-size: 13px; font-weight: 700; color: #e4ae39; background: rgba(228, 174, 57, 0.08); padding: 6px 14px; border-radius: 6px; display: inline-block; }

        .back-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; margin-bottom: 24px; align-self: flex-start; }
        .back-btn:hover { color: #fff; }

        .roulette-container {
            position: relative; width: 100%; max-width: 900px; height: 150px; background: #090b0e;
            border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; align-self: center; margin-bottom: 30px;
        }
        .roulette-marker { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 100%; background: #5dfdcb; z-index: 10; box-shadow: 0 0 12px #5dfdcb; }
        .roulette-fade { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #090b0e 0%, transparent 20%, transparent 80%, #090b0e 100%); z-index: 5; pointer-events: none; }
        .roulette-track { display: flex; position: absolute; left: 0; top: 15px; height: 120px; will-change: transform; }

        .skin-item {
            flex-shrink: 0; width: 130px; height: 120px; margin: 0 4px; background: var(--bg-card);
            border-radius: 10px; display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 12px 8px; border: 1px solid var(--border-color); position: relative;
        }
        .skin-item::before { content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 3px; border-radius: 3px 3px 0 0; }
        .skin-item svg { width: 65px; height: 50px; margin-top: 5px; }
        .skin-title { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
        .skin-cost { font-size: 11px; font-weight: 700; color: var(--text-muted); }

        .rarity-mil-spec::before { background: var(--mil-spec); } .rarity-mil-spec svg { fill: var(--mil-spec); }
        .rarity-restricted::before { background: var(--restricted); } .rarity-restricted svg { fill: var(--restricted); }
        .rarity-classified::before { background: var(--classified); } .rarity-classified svg { fill: var(--classified); }
        .rarity-covert::before { background: var(--covert); } .rarity-covert svg { fill: var(--covert); }
        .rarity-special::before { background: var(--special); } .rarity-special svg { fill: var(--special); }

        .action-zone { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .btn-action-main {
            background: #5dfdcb; color: #060709; border: none; padding: 16px 48px; font-size: 15px;
            font-weight: 700; border-radius: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-action-main:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(93, 253, 203, 0.4); }
        .btn-action-main:disabled { background: #1c212c; color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

        .win-modal {
            background: var(--bg-card); border: 1px solid var(--border-color); padding: 24px; border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; gap: 16px; opacity: 0; transform: scale(0.95);
            transition: 0.3s; pointer-events: none; margin-top: 10px;
        }
        .win-modal.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .win-buttons { display: flex; gap: 10px; }
        .btn-sub { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
        .btn-sell-skin { background: #238636; color: #fff; } .btn-sell-skin:hover { background: #2ea043; }
        .btn-keep-skin { background: transparent; color: #fff; border-color: var(--border-color); } .btn-keep-skin:hover { background: rgba(255,255,255,0.03); }

        .upgrade-layout { display: flex; justify-content: space-between; gap: 24px; }
        .inventory-panel { width: 32%; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; height: 520px; display: flex; flex-direction: column; }
        .panel-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); text-align: center; }
        
        .items-scroll-grid { display: flex; flex-wrap: wrap; gap: 10px; overflow-y: auto; align-content: flex-start; justify-content: center; padding-bottom: 10px;}
        .items-scroll-grid::-webkit-scrollbar { width: 4px; }
        .items-scroll-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .items-scroll-grid .skin-item { width: 105px; height: 110px; cursor: pointer; }
        .items-scroll-grid .skin-item.selected { border-color: #5dfdcb; background: rgba(93, 253, 203, 0.05); transform: scale(0.96); }

        .upgrade-core-zone { width: 36%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .circle-radar { position: relative; width: 220px; height: 220px; margin-bottom: 24px; }
        .radar-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .radar-track-bg { fill: none; stroke: #0f121a; stroke-width: 12; }
        .radar-track-fill { fill: none; stroke: #5dfdcb; stroke-width: 12; stroke-dasharray: 0 628.3; transition: stroke-dasharray 0.3s ease; }
        .radar-hand { position: absolute; top: 0; left: 50%; width: 3px; height: 110px; background: #e4ae39; transform-origin: bottom center; transform: translateX(-50%) rotate(0deg); z-index: 5; }
        .radar-center-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .radar-percent { font-size: 36px; font-weight: 800; color: #fff; }
        .radar-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .upg-status { font-size: 14px; font-weight: 700; margin-top: 16px; text-transform: uppercase; min-height: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Dropbox</div>
        <div class="nav-tabs">
            <button class="tab-btn active" id="menu-main" onclick="navigateTo('main-page')">Кейсы</button>
            <button class="tab-btn" id="menu-upgrade" onclick="navigateTo('upgrade-page')">Апгрейд</button>
        </div>
        <div class="balance-box">Баланс: $<span id="userBalance">1500.00</span></div>
    </div>

    <div id="main-page" class="page active">
        <div class="cases-grid" id="casesGrid"></div>
    </div>

    <div id="case-room-page" class="page">
        <button class="back-btn" onclick="navigateTo('main-page')">← К списку кейсов</button>
        <h2 id="currentCaseTitle" style="margin-bottom: 24px; font-weight: 800; text-align: center;">Название</h2>

        <div class="roulette-container">
            <div class="roulette-marker"></div>
            <div class="roulette-fade"></div>
            <div class="roulette-track" id="rouletteTrack"></div>
        </div>

        <div class="action-zone">
            <button class="btn-action-main" id="startRollBtn">Открыть кейс</button>
            <div class="win-modal" id="winModal">
                <div id="winSkinTitle" style="font-weight:700; font-size:16px;">Выбили предмет</div>
                <div class="win-buttons">
                    <button class="btn-sub btn-sell-skin" id="sellSkinBtn">Продать</button>
                    <button class="btn-sub btn-keep-skin" id="keepSkinBtn">Оставить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="upgrade-page" class="page">
        <div class="upgrade-layout">
            <div class="inventory-panel">
                <div class="panel-title">Ваш инвентарь</div>
                <div class="items-scroll-grid" id="playerInvGrid"></div>
            </div>

            <div class="upgrade-core-zone">
                <div class="circle-radar">
                    <div class="radar-hand" id="radarHand"></div>
                    <svg class="radar-svg">
                        <circle class="radar-track-bg" cx="110" cy="110" r="100"></circle>
                        <circle class="radar-track-fill" id="radarTrackFill" cx="110" cy="110" r="100"></circle>
                    </svg>
                    <div class="radar-center-info">
                        <div class="radar-percent" id="chancePercentText">0%</div>
                        <div class="radar-lbl">Шанс</div>
                    </div>
                </div>
                <button class="btn-action-main" id="executeUpgradeBtn" disabled>Апгрейд</button>
                <div class="upg-status" id="upgradeStatusText"></div>
            </div>

            <div class="inventory-panel">
                <div class="panel-title">Выберите цель</div>
                <div class="items-scroll-grid" id="targetPoolGrid"></div>
            </div>
        </div>
    </div>

    <script>
        const SVG_TEMPLATES = {
            rifle: `<svg viewBox="0 0 100 60"><path d="M5,32 L22,32 L25,26 L38,26 L41,32 L75,32 L78,24 L82,24 L85,34 L95,34 L95,38 L85,38 L82,46 L70,46 L68,38 L30,38 L25,48 L15,48 Z M10,32 L10,42 M45,32 L45,36" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            knife: `<svg viewBox="0 0 100 60"><path d="M15,45 L25,35 L30,38 L22,48 Z M25,35 L75,15 L85,12 L80,22 L30,38 Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            pistol: `<svg viewBox="0 0 100 60"><path d="M30,20 L75,20 L75,32 L45,32 L40,50 L28,48 L32,32 Z M45,32 L45,38" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            gloves: `<svg viewBox="0 0 100 60"><path d="M25,45 C25,25 35,20 50,20 C65,20 75,25 75,45 C75,52 65,55 50,55 C35,55 25,52 25,45 Z M38,20 L38,12 M50,20 L50,10 M62,20 L62,12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            sniper: `<svg viewBox="0 0 100 60"><path d="M5,35 L20,35 L25,30 L45,30 L50,25 L90,25 L95,30 L95,35 L70,35 L65,42 L35,42 L30,48 L15,48 Z M40,25 L40,20 L60,20 L60,25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            caseIcon: `<svg viewBox="0 0 100 100"><path d="M15,30 L85,30 L90,45 L10,45 Z M10,48 L90,48 L85,85 L15,85 Z M42,45 L58,45 L55,55 L45,55 Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        };

        const DATABASE = [
            {
                name: "Бюджетный", price: 1.50, type: "caseIcon",
                contains: [
                    { name: "Glock-18 | Литье", rarity: "rarity-mil-spec", price: 0.40, type: "pistol" },
                    { name: "P250 | Рентген", rarity: "rarity-mil-spec", price: 0.60, type: "pistol" },
                    { name: "MAC-10 | Океанские мотивы", rarity: "rarity-restricted", price: 1.20, type: "rifle" },
                    { name: "M4A4 | Магний", rarity: "rarity-restricted", price: 2.50, type: "rifle" },
                    { name: "AK-47 | Затерянная земля", rarity: "rarity-classified", price: 5.00, type: "rifle" },
                    { name: "AWP | Капилляры", rarity: "rarity-classified", price: 8.50, type: "sniper" },
                    { name: "M4A1-S | Опустошитель", rarity: "rarity-covert", price: 25.00, type: "rifle" },
                    { name: "Наваха | Патина", rarity: "rarity-special", price: 85.00, type: "knife" }
                ]
            },
            {
                name: "Кейс «Грёзы и Кошмары»", price: 3.50, type: "caseIcon",
                contains: [
                    { name: "SCAR-20 | Птичья игра", rarity: "rarity-mil-spec", price: 0.80, type: "sniper" },
                    { name: "MAG-7 | Предсказание", rarity: "rarity-mil-spec", price: 1.10, type: "rifle" },
                    { name: "M4A1-S | Ночной ужас", rarity: "rarity-restricted", price: 4.50, type: "rifle" },
                    { name: "USP-S | Билет в ад", rarity: "rarity-restricted", price: 6.20, type: "pistol" },
                    { name: "Dual Berettas | Мелодия", rarity: "rarity-classified", price: 12.00, type: "pistol" },
                    { name: "MP9 | Стройотряд", rarity: "rarity-classified", price: 18.00, type: "rifle" },
                    { name: "AK-47 | Ночные кошмары", rarity: "rarity-covert", price: 45.00, type: "rifle" },
                    { name: "Нож-бабочка | Легенды", rarity: "rarity-special", price: 1550.00, type: "knife" }
                ]
            },
            {
                name: "Элитный Снайпер", price: 12.00, type: "sniper",
                contains: [
                    { name: "AWP | Бог червей", rarity: "rarity-mil-spec", price: 3.50, type: "sniper" },
                    { name: "AWP | Мортис", rarity: "rarity-restricted", price: 8.00, type: "sniper" },
                    { name: "AWP | Горячечные сны", rarity: "rarity-classified", price: 22.00, type: "sniper" },
                    { name: "AWP | Красная линия", rarity: "rarity-classified", price: 45.00, type: "sniper" },
                    { name: "AWP | Азимов", rarity: "rarity-covert", price: 140.00, type: "sniper" },
                    { name: "AWP | История о драконе", rarity: "rarity-special", price: 8500.00, type: "sniper" }
                ]
            },
            {
                name: "Тайный Арсенал", price: 25.00, type: "rifle",
                contains: [
                    { name: "AK-47 | Снежный вихрь", rarity: "rarity-restricted", price: 15.00, type: "rifle" },
                    { name: "M4A1-S | Шедевр", rarity: "rarity-classified", price: 55.00, type: "rifle" },
                    { name: "AK-47 | Кровавый спорт", rarity: "rarity-covert", price: 110.00, type: "rifle" },
                    { name: "M4A4 | Император", rarity: "rarity-covert", price: 135.00, type: "rifle" },
                    { name: "AK-47 | Огненный змей", rarity: "rarity-special", price: 950.00, type: "rifle" },
                    { name: "M4A4 | Вой", rarity: "rarity-special", price: 4200.00, type: "rifle" }
                ]
            },
            {
                name: "Кейс Перчаток", price: 45.00, type: "gloves",
                contains: [
                    { name: "Перчатки | Скотч", rarity: "rarity-restricted", price: 85.00, type: "gloves" },
                    { name: "Перчатки | Лес", rarity: "rarity-classified", price: 140.00, type: "gloves" },
                    { name: "Обмотки | Пустошь", rarity: "rarity-covert", price: 290.00, type: "gloves" },
                    { name: "Спортивные | Порок", rarity: "rarity-special", price: 1800.00, type: "gloves" },
                    { name: "Спортивные | Ящик Пандоры", rarity: "rarity-special", price: 5500.00, type: "gloves" }
                ]
            },
            {
                name: "НОЖЕВОЙ ПРЕМИУМ", price: 150.00, type: "knife",
                contains: [
                    { name: "Gut Knife | Пыльник", rarity: "rarity-restricted", price: 95.00, type: "knife" },
                    { name: "Flip Knife | Волны", rarity: "rarity-classified", price: 320.00, type: "knife" },
                    { name: "Karambit | Убийство", rarity: "rarity-covert", price: 980.00, type: "knife" },
                    { name: "Butterfly | Градиент", rarity: "rarity-special", price: 2800.00, type: "knife" },
                    { name: "Karambit | Изумруд", rarity: "rarity-special", price: 8500.00, type: "knife" },
                    { name: "Karambit | Поверхностная закалка (Blue Gem)", rarity: "rarity-special", price: 15000.00, type: "knife" }
                ]
            }
        ];

        let balance = 1500.00;
        let inventory = [];
        let targetsPool = [];
        let currentActiveCase = null;
        let currentRolledDrop = null;
        let rouletteInProgress = false;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        function emitBeep(frequency, duration, volume, type = 'sine') {
            try {
                if (audioContext.state === 'suspended') audioContext.resume();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(audioContext.destination);
                osc.type = type; osc.frequency.value = frequency;
                gain.gain.setValueAtTime(volume, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + duration);
                osc.start(); osc.stop(audioContext.currentTime + duration);
            } catch(e) {}
        }

        window.onload = function() {
            let uniqueTargets = new Set();
            DATABASE.forEach(c => {
                c.contains.forEach(s => {
                    if (s.price > 10 && !uniqueTargets.has(s.name)) {
                        targetsPool.push(s);
                        uniqueTargets.add(s.name);
                    }
                });
            });
            targetsPool.sort((a, b) => a.price - b.price);
            buildCasesMenu();
            refreshBalanceDisplay();
        };

        function refreshBalanceDisplay() { document.getElementById('userBalance').textContent = balance.toFixed(2); }

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'main-page') document.getElementById('menu-main').classList.add('active');
            if (pageId === 'upgrade-page') {
                document.getElementById('menu-upgrade').classList.add('active');
                drawPlayerInventory();
                drawUpgradeTargets();
                calculateUpgradeWeights();
            }
        }

        function buildCasesMenu() {
            const grid = document.getElementById('casesGrid');
            grid.innerHTML = '';
            DATABASE.forEach((c, idx) => {
                const card = document.createElement('div');
                card.className = 'case-card';
                card.onclick = () => selectCaseRoom(idx);
                card.innerHTML = `
                    <div class="case-icon-wrap">${SVG_TEMPLATES[c.type]}</div>
                    <div class="case-name">${c.name}</div>
                    <div class="case-price">$${c.price.toFixed(2)}</div>
                `;
                grid.appendChild(card);
            });
        }

        function selectCaseRoom(idx) {
            currentActiveCase = DATABASE[idx];
            document.getElementById('currentCaseTitle').textContent = currentActiveCase.name;
            document.getElementById('winModal').classList.remove('active');
            navigateTo('case-room-page');
            fillRouletteTrack();
        }

        function parseSkinToHTML(skin) {
            const node = document.createElement('div');
            node.className = `skin-item ${skin.rarity}`;
            node.innerHTML = `
                ${SVG_TEMPLATES[skin.type || 'rifle']}
                <div class="skin-title" title="${skin.name}">${skin.name}</div>
                <div class="skin-cost">$${skin.price.toFixed(2)}</div>
            `;
            return node;
        }

        function rollDropFromCase(caseObj) {
            const rand = Math.random() * 100;
            let chosenRarity = 'rarity-mil-spec';
            if (rand < 0.26) chosenRarity = 'rarity-special';
            else if (rand < 3.2) chosenRarity = 'rarity-covert';
            else if (rand < 16.0) chosenRarity = 'rarity-classified';
            else if (rand < 40.0) chosenRarity = 'rarity-restricted';

            let pool = caseObj.contains.filter(s => s.rarity === chosenRarity);
            if (pool.length === 0) pool = caseObj.contains;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        const track = document.getElementById('rouletteTrack');

        function fillRouletteTrack() {
            track.innerHTML = '';
            for(let i = 0; i < 40; i++) track.appendChild(parseSkinToHTML(rollDropFromCase(currentActiveCase)));
        }

        document.getElementById('startRollBtn').onclick = function() {
            if (rouletteInProgress || !currentActiveCase) return;
            if (balance < currentActiveCase.price) return alert("Недостаточно денег на балансе!");

            balance -= currentActiveCase.price;
            refreshBalanceDisplay();
            
            rouletteInProgress = true;
            this.disabled = true;
            document.getElementById('winModal').classList.remove('active');

            fillRouletteTrack();
            currentRolledDrop = rollDropFromCase(currentActiveCase);
            track.replaceChild(parseSkinToHTML(currentRolledDrop), track.children[30]);
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';

            const innerOffset = Math.floor(Math.random() * 60) - 30;
            const targetX = - (30 * 138 + 69 - 450 + innerOffset);

            setTimeout(() => {
                track.style.transition = 'transform 5s cubic-bezier(0.1, 0.85, 0.15, 1)';
                track.style.transform = `translateX(${targetX}px)`;
                soundTicker(targetX);
            }, 40);

            setTimeout(() => {
                rouletteInProgress = false;
                document.getElementById('startRollBtn').disabled = false;
                emitBeep(520, 0.3, 0.08, 'triangle');
                
                document.getElementById('winSkinTitle').textContent = `Выбито: ${currentRolledDrop.name} ($${currentRolledDrop.price.toFixed(2)})`;
                document.getElementById('sellSkinBtn').textContent = `Продать за $${currentRolledDrop.price.toFixed(2)}`;
                document.getElementById('winModal').classList.add('active');
            }, 5100);
        };

        function soundTicker(targetX) {
            let lastTickIdx = 0;
            const startTime = performance.now();
            function update() {
                if (!rouletteInProgress) return;
                const passed = performance.now() - startTime;
                if (passed >= 5000) return;
                
                const progress = passed / 5000;
                const currentX = targetX * (1 - Math.pow(1 - progress, 4));
                const currentIdx = Math.floor(Math.abs(currentX - 450) / 138);

                if (currentIdx > lastTickIdx && currentIdx < 33) {
                    emitBeep(650, 0.03, 0.03, 'sine');
                    lastTickIdx = currentIdx;
                }
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        document.getElementById('sellSkinBtn').onclick = function() {
            balance += currentRolledDrop.price;
            refreshBalanceDisplay();
            currentRolledDrop = null;
            document.getElementById('winModal').classList.remove('active');
        };

        document.getElementById('keepSkinBtn').onclick = function() {
            inventory.unshift({ ...currentRolledDrop, uid: Date.now() + Math.random() });
            currentRolledDrop = null;
            document.getElementById('winModal').classList.remove('active');
        };

        let activeInvSelection = null;
        let activeTargetSelection = null;
        let upgradeAnimationRunning = false;

        function drawPlayerInventory() {
            const grid = document.getElementById('playerInvGrid');
            grid.innerHTML = '';
            if (inventory.length === 0) {
                grid.innerHTML = '<div style="font-size:11px; color:var(--text-muted); text-align:center; padding-top:40px;">Пусто.</div>';
                return;
            }
            inventory.forEach(item => {
                const node = parseSkinToHTML(item);
                if (activeInvSelection?.uid === item.uid) node.classList.add('selected');
                node.onclick = () => {
                    if (upgradeAnimationRunning) return;
                    activeInvSelection = (activeInvSelection?.uid === item.uid) ? null : item;
                    drawPlayerInventory();
                    calculateUpgradeWeights();
                };
                grid.appendChild(node);
            });
        }

        function drawUpgradeTargets() {
            const grid = document.getElementById('targetPoolGrid');
            grid.innerHTML = '';
            targetsPool.forEach(item => {
                const node = parseSkinToHTML(item);
                if (activeTargetSelection?.name === item.name) node.classList.add('selected');
                node.onclick = () => {
                    if (upgradeAnimationRunning) return;
                    activeTargetSelection = (activeTargetSelection?.name === item.name) ? null : item;
                    drawUpgradeTargets();
                    calculateUpgradeWeights();
                };
                grid.appendChild(node);
            });
        }

        function calculateUpgradeWeights() {
            const txt = document.getElementById('chancePercentText');
            const fill = document.getElementById('radarTrackFill');
            const btn = document.getElementById('executeUpgradeBtn');

            if (!activeInvSelection || !activeTargetSelection) {
                txt.textContent = "0%"; fill.style.strokeDasharray = "0 628.3"; btn.disabled = true; return;
            }

            let chance = (activeInvSelection.price / activeTargetSelection.price) * 100;
            if (chance > 100) chance = 100;

            txt.textContent = `${chance.toFixed(1)}%`;
            fill.style.strokeDasharray = `${(chance / 100) * 628.3} 628.3`;
            btn.disabled = (chance >= 100 || chance < 0.1);
        }

        document.getElementById('executeUpgradeBtn').onclick = function() {
            if (upgradeAnimationRunning || !activeInvSelection || !activeTargetSelection) return;

            upgradeAnimationRunning = true; this.disabled = true;
            document.getElementById('upgradeStatusText').textContent = "";

            const chance = (activeInvSelection.price / activeTargetSelection.price) * 100;
            const hand = document.getElementById('radarHand');

            const completeSpins = 4 + Math.floor(Math.random() * 3);
            const degreeTarget = Math.floor(Math.random() * 360);
            const totalRotationDeg = (completeSpins * 360) + degreeTarget;
            const userWon = degreeTarget <= (chance * 3.6);

            hand.style.transition = 'transform 3.8s cubic-bezier(0.15, 0.8, 0.2, 1)';
            hand.style.transform = `translateX(-50%) rotate(${totalRotationDeg}deg)`;

            let soundTicks = 0;
            const soundInterval = setInterval(() => {
                if (soundTicks < 35) { emitBeep(800, 0.01, 0.02, 'sine'); soundTicks++; } 
                else clearInterval(soundInterval);
            }, 100);

            setTimeout(() => {
                upgradeAnimationRunning = false;
                const status = document.getElementById('upgradeStatusText');
                inventory = inventory.filter(i => i.uid !== activeInvSelection.uid);

                if (userWon) {
                    status.style.color = "#5dfdcb"; status.textContent = "УСПЕХ!";
                    inventory.unshift({ ...activeTargetSelection, uid: Date.now() + Math.random() });
                    emitBeep(440, 0.4, 0.08, 'sine');
                } else {
                    status.style.color = "#eb4b4b"; status.textContent = "ПРОВАЛ!";
                    emitBeep(130, 0.4, 0.1, 'sawtooth');
                }

                activeInvSelection = null;
                drawPlayerInventory(); calculateUpgradeWeights();
                setTimeout(() => { hand.style.transition = 'none'; hand.style.transform = 'translateX(-50%) rotate(0deg)'; }, 1200);
            }, 3900);
        };
    </script>
</body>
</html>
